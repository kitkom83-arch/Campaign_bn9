<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1 กติกาการเข้าร่วมกิจกรรม</title>
  <meta name="theme-color" content="#081326" />
  <style>
:root{
  --bg:#081326;
  --bg2:#0d1c36;
  --card:#132644;
  --card2:#10203b;
  --text:#f5f8ff;
  --muted:#c2d2f7;
  --line:rgba(123,166,255,.18);
  --accent:#2f7fff;
  --accent2:#6ca6ff;
  --shadow:0 12px 35px rgba(0,0,0,.38);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans Thai","Noto Sans",Arial,sans-serif;
  background:
    radial-gradient(circle at top, rgba(47,127,255,.22), transparent 30%),
    linear-gradient(180deg, #081326 0%, #09172d 35%, #081326 100%);
  color:var(--text);
  min-height:100vh;
}
a{color:inherit}
.page{
  width:min(100%, 860px);
  margin:0 auto;
  padding:20px 14px 40px;
}
.shell{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border:1px solid var(--line);
  border-radius:26px;
  box-shadow:var(--shadow);
  overflow:hidden;
  backdrop-filter: blur(2px);
}
.header{
  padding:24px 18px 18px;
  text-align:center;
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
  border-bottom:1px solid var(--line);
}
.logo{
  display:block;
  width:min(170px, 52vw);
  margin:0 auto 10px;
  filter: drop-shadow(0 10px 26px rgba(255,190,60,.12));
}
.title{
  margin:0;
  font-size:clamp(1.7rem, 2.6vw, 2.45rem);
  font-weight:900;
  line-height:1.05;
  text-align:center;
}
.title span{
  display:inline-block;
  padding:6px 12px;
  border-radius:14px;
  background:linear-gradient(180deg,#1e58d8,#1142b4);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
}
.subtitle{
  margin:12px auto 0;
  max-width:650px;
  color:var(--muted);
  font-size:0.98rem;
  line-height:1.6;
}
.cards{
  padding:18px;
  display:grid;
  gap:14px;
}
.card-link{
  display:block;
  text-decoration:none;
  background:linear-gradient(180deg, rgba(21,40,72,.95), rgba(17,32,59,.98));
  border:1px solid var(--line);
  border-radius:20px;
  padding:18px 16px;
  transition:transform .15s ease, border-color .15s ease, background .15s ease;
}
.card-link:hover{
  transform:translateY(-2px);
  border-color:rgba(123,166,255,.35);
}
.card-title{
  margin:0 0 6px;
  font-weight:800;
  font-size:1.1rem;
}
.card-desc{
  margin:0;
  color:var(--muted);
  line-height:1.55;
}
.footer{
  padding:8px 18px 24px;
  text-align:center;
  color:var(--muted);
  font-size:.95rem;
}
.back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
  margin:0 0 16px;
  color:#d7e6ff;
  font-weight:700;
}
.page-card{
  padding:18px;
}
.inner-card{
  background:linear-gradient(180deg, rgba(21,40,72,.95), rgba(17,32,59,.98));
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
}
.h1{
  margin:0 0 10px;
  font-size:clamp(1.28rem,2.5vw,1.8rem);
  line-height:1.3;
}
.lead{
  margin:0 0 18px;
  color:var(--muted);
  line-height:1.7;
}
.rule-image{
  width:100%;
  border-radius:18px;
  display:block;
  box-shadow: var(--shadow);
  border:1px solid rgba(255,255,255,.08);
}
.note-box{
  margin-top:16px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px 16px;
  color:#eef4ff;
  line-height:1.75;
}
.x-wrap{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  padding:14px;
}
.x-wrap > * { color:#111; }
.cta{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:46px;
  padding:10px 18px;
  border-radius:14px;
  background:linear-gradient(180deg,#2f7fff,#1c61ea);
  color:#fff;
  text-decoration:none;
  font-weight:800;
  box-shadow:0 8px 22px rgba(47,127,255,.25);
  margin-top:14px;
}
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  background:rgba(3,10,20,.8);
  z-index:9999;
}
.modal.show{display:flex}
.modal-box{
  width:min(100%, 760px);
  max-height:min(90vh, 1200px);
  overflow:auto;
  background:linear-gradient(180deg,#10203b,#0b172c);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow: var(--shadow);
  padding:14px;
}
.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
  position:sticky;
  top:0;
  background:linear-gradient(180deg,#10203b,#0b172c);
  padding:6px 4px 10px;
}
.modal-title{
  margin:0;
  font-size:1.05rem;
  font-weight:900;
}
.modal-close{
  border:0;
  border-radius:12px;
  min-width:44px;
  min-height:44px;
  cursor:pointer;
  background:#234b9c;
  color:#fff;
  font-size:1.3rem;
  font-weight:800;
}
.modal-image{
  width:100%;
  display:block;
  border-radius:16px;
}
@media (max-width:560px){
  .header{padding:20px 14px 16px}
  .cards{padding:14px}
  .card-link{padding:16px 14px}
  .page-card{padding:14px}
  .inner-card{padding:14px}
  .x-wrap{padding:6px}
}
</style>
</head>
<body>
  <main class="page">
    <section class="shell">
      
<div class="header">
  <img class="logo" src="./assets/logo.png" alt="MAHA289 Logo">
  <h1 class="title"><span>กิจกรรม MAHA289</span></h1>
</div>

<div class="page-card">
  <div class="inner-card">
    <a class="back" href="./index.html">← กลับหน้าเมนู</a>
    <h1 class="h1">1 กติกาการเข้าร่วมกิจกรรม</h1>
    <p class="lead">กดอ่านกติกาให้ครบก่อนเริ่มทำกิจกรรม แล้วค่อยกลับไปเลือกเมนูที่ต้องการทำต่อได้เลย</p>
    <img class="rule-image" src="./assets/rules.png" alt="กติกาการเข้าร่วมกิจกรรม MAHA289">
    <div class="note-box">
      ส่งหลักฐานให้ครบตามภาพตัวอย่าง แล้วกลับไปตอบแชทแอดมินด้วยข้อความ <strong>“ส่งครบแล้ว”</strong> พร้อมแนบภาพหลักฐานเพื่อให้ทีมงานตรวจสอบและให้สิทธิ์เร็วขึ้น
    </div>
  </div>
</div>

    </section>
  </main>
  
</body>
</html>
